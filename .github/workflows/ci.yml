name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9.12.0'

jobs:
  quality:
    name: Lint · Typecheck · Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Packages bouwen (contracts + db)
        run: pnpm --filter="./packages/*" build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm --recursive --if-present test

      # Coverage apart: pnpm --recursive ondersteunt geen script-args meegeven.
      # Elk pakket dat coverage wil genereren heeft een eigen test:coverage script.
      - name: Coverage (api)
        run: pnpm --filter=@hr-saas/api exec vitest run --passWithNoTests --exclude='**/*.integration.test.ts' --coverage || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/**'
          retention-days: 14

  integration:
    name: Integration (API + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hrsaas
          POSTGRES_PASSWORD: hrsaas
          POSTGRES_DB: hrsaas_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Lokaal/CI: pooler en directe URL zijn identiek (geen PgBouncer in het pad).
      # Beide worden gezet omdat schema.prisma `directUrl` declareert (zie ADR-0005).
      DATABASE_URL: postgresql://hrsaas:hrsaas@localhost:5432/hrsaas_test
      DIRECT_URL: postgresql://hrsaas:hrsaas@localhost:5432/hrsaas_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Packages bouwen (contracts + db)
        run: pnpm --filter="./packages/*" build

      - name: Prisma migrate
        run: pnpm --filter=@hr-saas/db migrate:deploy

      - name: Integration tests
        run: pnpm --filter=@hr-saas/api test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter="./packages/*" build
      - run: pnpm build

      - name: Nuxt bundle-size rapport
        run: |
          if [ -d apps/web/.output ]; then
            du -sh apps/web/.output/public/_nuxt/* | sort -h | tail -20 > bundle-size.txt
            cat bundle-size.txt
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-size
          path: bundle-size.txt
          retention-days: 30

  security:
    name: Security · Audit · SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Audit (fail op HIGH/CRITICAL)
        run: pnpm audit --prod --audit-level=high

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

  e2e:
    name: E2E (alleen met label `e2e`)
    if: contains(github.event.pull_request.labels.*.name, 'e2e')
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
