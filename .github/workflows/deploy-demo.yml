name: Deploy · demo (Vercel + Neon)

# Trigger: elke push naar main.
# Dit is de demo-pipeline (ADR-0004). De productie-pipeline (AWS ECS) volgt
# in een latere sprint via deploy-prod.yml.
#
# Vereiste GitHub-secrets (stel in via repo Settings → Secrets and variables → Actions):
#   NEON_DATABASE_URL   — pooled Neon URL (PgBouncer), formaat:
#                         postgresql://user:pass@<proj>-pooler.eu-central-1.aws.neon.tech/neondb
#                         ?sslmode=require&pgbouncer=true&connect_timeout=10
#   NEON_DIRECT_URL     — directe Neon URL (zonder pooler), formaat:
#                         postgresql://user:pass@<proj>.eu-central-1.aws.neon.tech/neondb
#                         ?sslmode=require&connect_timeout=10
#   PII_ENCRYPTION_KEY  — 32-byte hex string. Gebruik NOOIT de dev-key hier.
#                         Genereer: openssl rand -hex 32
#   JWT_SECRET          — 32-byte hex. Genereer: openssl rand -hex 32
#                         Sync via: gh secret set JWT_SECRET (pipeline zet Vercel via vercel-env-sync)
#   COOKIE_SECRET       — 32-byte hex. Genereer: openssl rand -hex 32
#                         Sync via: gh secret set COOKIE_SECRET (idem)
#   VERCEL_TOKEN        — personal access token uit vercel.com/account/tokens
#   VERCEL_ORG_ID       — te vinden in vercel.com team-settings of .vercel/project.json
#   VERCEL_PROJECT_ID   — te vinden in .vercel/project.json na `vercel link`
#   VERCEL_TEAM_ID      — team-ID uit Vercel API (nodig voor env-sync job)
#
# Deprecated / niet meer gebruikt (INFRA-0021):
#   FLY_API_TOKEN       — was: Fly.io deploy-token. API draait nu als Nitro op Vercel.
#   FLY_APP_NAME        — was: hr-saas-api-demo. Niet meer relevant.
#   CORS_ALLOWED_ORIGINS — was: Fly.io secrets. Web + API nu same-origin op Vercel.
#
# Zie docs/runbooks/demo-deploy.md voor eenmalige setup en troubleshooting.

on:
  push:
    branches: [main]

concurrency:
  group: deploy-demo
  # Niet annuleren bij overlap — een lopende migrate mag niet halverwege stoppen.
  cancel-in-progress: false

env:
  NODE_VERSION: '24.x'
  PNPM_VERSION: '9.12.0'

jobs:
  # ─── Job 1: migrate ───────────────────────────────────────────────────────
  # Draait Prisma migrate deploy via de directe URL (zonder PgBouncer).
  # PgBouncer transaction-mode breekt advisory locks die Prisma migrate gebruikt.
  # Zie ADR-0005 voor de redenering achter dual-URL.
  migrate:
    name: DB migraties (Neon direct)
    runs-on: ubuntu-latest
    environment: demo
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build contracts
        run: pnpm --filter=@hr-saas/contracts build

      - name: Prisma generate
        env:
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
        run: pnpm --filter=@hr-saas/db generate

      - name: Prisma migrate deploy
        # Gebruik NEON_DIRECT_URL voor beide: migrate heeft geen pooler nodig.
        env:
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
        run: pnpm --filter=@hr-saas/db migrate:deploy

  # ─── Job 2: seed ─────────────────────────────────────────────────────────
  # Seed de Neon-DB met testdata (acme-tenant + 3 testgebruikers).
  # Idempotent via upsert — meerdere runs zijn veilig.
  # Vereist NEON_DIRECT_URL: seeding werkt NIET via PgBouncer (advisory locks).
  # Zie docs/runbooks/seed-data.md voor details en troubleshooting.
  seed:
    name: Seed testdata (Neon direct)
    runs-on: ubuntu-latest
    environment: demo
    needs: [migrate]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build contracts
        run: pnpm --filter=@hr-saas/contracts build

      - name: Prisma generate
        env:
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
        run: pnpm --filter=@hr-saas/db generate

      - name: Seed testdata (idempotent)
        env:
          DATABASE_URL: ${{ secrets.NEON_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.NEON_DIRECT_URL }}
          PII_ENCRYPTION_KEY: ${{ secrets.PII_ENCRYPTION_KEY }}
        run: pnpm --filter=@hr-saas/db exec prisma db seed

  # ─── Job 3: vercel-env-sync ───────────────────────────────────────────────
  # Synchroniseert Vercel production + preview env-vars vanuit GitHub secrets.
  # Werkt idempotent: bestaande vars worden via PATCH bijgewerkt, ontbrekende
  # via POST aangemaakt. Draait vóór deploy-web zodat Nitro de juiste waarden
  # heeft bij de build.
  #
  # Achtergrond (INFRA-0021): API draait niet meer op Fly.io maar als Nuxt Nitro
  # server-routes op Vercel. JWT_SECRET, COOKIE_SECRET, PII_ENCRYPTION_KEY,
  # DATABASE_URL en DIRECT_URL moeten daarom op Vercel beschikbaar zijn.
  vercel-env-sync:
    name: Sync env-vars naar Vercel
    runs-on: ubuntu-latest
    environment: demo
    needs: [seed]
    steps:
      - name: Sync env-vars via Vercel API
        # Gebruik upsert-patroon: probeer POST, bij conflict (409) haal ID op en PATCH.
        # Targets: production + preview (development wordt lokaal via .env beheerd).
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail

          BASE="https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env"
          AUTH="Authorization: Bearer ${VERCEL_TOKEN}"
          QUERY="teamId=${VERCEL_TEAM_ID}"

          upsert_env() {
            local KEY="$1"
            local VALUE="$2"
            local PAYLOAD
            PAYLOAD=$(printf '{"key":"%s","value":"%s","type":"encrypted","target":["production","preview"]}' "$KEY" "$VALUE")

            HTTP=$(curl -s -o /tmp/vercel_resp.json -w "%{http_code}" \
              -X POST "${BASE}?${QUERY}" \
              -H "$AUTH" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            if [ "$HTTP" = "200" ] || [ "$HTTP" = "201" ]; then
              echo "  [OK] $KEY aangemaakt"
            elif [ "$HTTP" = "409" ]; then
              ENV_ID=$(curl -s "${BASE}?${QUERY}" \
                -H "$AUTH" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          envs = data.get('envs', [])
          for e in envs:
              if e.get('key') == '$KEY':
                  print(e['id'])
                  break
          ")
              if [ -z "$ENV_ID" ]; then
                echo "  [FOUT] $KEY: 409 maar ID niet gevonden" >&2
                exit 1
              fi
              PATCH_PAYLOAD=$(printf '{"value":"%s","type":"encrypted","target":["production","preview"]}' "$VALUE")
              HTTP2=$(curl -s -o /dev/null -w "%{http_code}" \
                -X PATCH "${BASE}/${ENV_ID}?${QUERY}" \
                -H "$AUTH" \
                -H "Content-Type: application/json" \
                -d "$PATCH_PAYLOAD")
              echo "  [PATCH $HTTP2] $KEY bijgewerkt"
            else
              echo "  [FOUT] $KEY: HTTP $HTTP" >&2
              cat /tmp/vercel_resp.json >&2
              exit 1
            fi
          }

          echo "Vercel env-vars synchroniseren..."
          upsert_env "JWT_SECRET"         "${{ secrets.JWT_SECRET }}"
          upsert_env "COOKIE_SECRET"      "${{ secrets.COOKIE_SECRET }}"
          upsert_env "PII_ENCRYPTION_KEY" "${{ secrets.PII_ENCRYPTION_KEY }}"
          upsert_env "DATABASE_URL"       "${{ secrets.NEON_DATABASE_URL }}"
          upsert_env "DIRECT_URL"         "${{ secrets.NEON_DIRECT_URL }}"
          echo "Sync klaar."

  # ─── Job 4: deploy-web ────────────────────────────────────────────────────
  # Deployt de Nuxt-app (inclusief Nitro server-routes = API) naar Vercel.
  # Wacht op vercel-env-sync zodat de juiste env-vars aanwezig zijn bij de build.
  deploy-web:
    name: Deploy web naar Vercel
    runs-on: ubuntu-latest
    environment: demo
    needs: [vercel-env-sync]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Vercel pull (haal project-config op)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          # NITRO_PRESET en NUXT_PUBLIC_API_BASE komen uit Vercel project env-vars.
          # Zie runbook sectie "Eenmalige setup — Vercel".
        run: |
          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Vercel deploy (pre-built)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Health check web
        run: |
          echo "Wachten op Vercel propagatie..."
          sleep 15
          # curl zonder -f zodat we de HTTP-statuscode altijd krijgen, ook bij 4xx.
          # Alleen 5xx en curl-fouten (000) zijn een harde fout.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://app.larsvdloo.com || echo "000")
          echo "Web health check HTTP $STATUS"
          if [ "$STATUS" = "000" ] || [ "${STATUS:0:1}" = "5" ]; then
            echo "Web health check mislukt — HTTP $STATUS"
            exit 1
          fi
          echo "Web bereikbaar — HTTP $STATUS"

  # ─── Job 5: smoke-test ────────────────────────────────────────────────────
  # Minimale rook-test na deploy: verifieer dat web en de Nitro API-route bereikbaar
  # zijn. Fly.io is verwijderd (INFRA-0021) — API draait nu via Nuxt Nitro op Vercel.
  smoke-test:
    name: Smoke tests na deploy
    runs-on: ubuntu-latest
    needs: [deploy-web]
    steps:
      - name: Web bereikbaar
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://app.larsvdloo.com || echo "000")
          echo "Web HTTP $STATUS"
          # Accepteer 2xx/3xx/4xx — alleen 5xx en curl-fouten (000) zijn echt kapot.
          [ "$STATUS" != "000" ] && [ "${STATUS:0:1}" != "5" ]

      - name: API /api/v1/healthz via Nitro
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://app.larsvdloo.com/api/v1/healthz || echo "000")
          echo "API healthz HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "API health check mislukt — HTTP $STATUS"
            exit 1
          fi
          echo "API healthz OK"

      - name: Deploy-log wegschrijven
        if: always()
        run: |
          echo "Demo deploy: $(date -u +%FT%TZ), sha=${GITHUB_SHA::7}, status=${{ job.status }}" \
            >> /tmp/deploy-demo.log
          cat /tmp/deploy-demo.log

  # ─── Job 6: e2e ──────────────────────────────────────────────────────────
  # Playwright E2E tegen de staging-URL na een succesvolle deploy.
  # Runt ALLEEN na smoke-tests zodat een kapotte deploy nooit E2E triggert.
  # Vereiste secrets: geen extra (gebruikt publieke staging-URL).
  # Vereiste seed-data: acme-tenant + testgebruikers — zie docs/runbooks/seed-data.md.
  e2e:
    name: E2E Playwright (staging)
    runs-on: ubuntu-latest
    needs: [smoke-test]
    env:
      E2E_BASE_URL: https://app.larsvdloo.com
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Playwright browsers installeren
        run: pnpm --filter=@hr-saas/web exec playwright install --with-deps chromium

      - name: E2E tests draaien
        run: pnpm --filter=@hr-saas/web test:e2e

      - name: Playwright rapport uploaden
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-demo-${{ github.sha }}
          path: apps/web/playwright-report/
          retention-days: 14
