name: Deploy · staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9.12.0'

jobs:
  deploy:
    name: Deploy naar staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write # OIDC naar AWS
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_STAGING }}
          aws-region: ${{ env.AWS_REGION }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@hr-saas/contracts build
      - run: pnpm --filter=@hr-saas/db generate
      - run: pnpm build

      # Placeholder — devops-qa vult dit met echte ECS/ECR stappen.
      - name: Deploy web + api
        run: |
          echo "Build image en push naar ECR, update ECS task-definition, force new deployment."
          echo "Zie docs/runbooks/deploy-staging.md."

      - name: Smoke test
        run: pnpm --filter=@hr-saas/web test:smoke --url=https://staging.hr-saas.example

      - name: Release-notitie staging
        run: |
          mkdir -p docs/sprints/latest
          echo "Staging deploy: $(date -u +%FT%TZ), sha=${GITHUB_SHA::7}" >> docs/sprints/latest/staging-deploys.log
